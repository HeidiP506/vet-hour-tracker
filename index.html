<section id="page-animal" class="space-y-4">
    <div class="flex justify-between items-center">
        <div>
            <h2 class="text-xl font-bold text-slate-100">General Animal Experience Logs</h2>
            <p class="text-xs text-slate-400">Track standard husbandry, shelter volunteering, and basic animal management hours</p>
        </div>
        <button onclick="toggleModal('animal-modal', true)" class="bg-teal-600 hover:bg-teal-500 text-white text-xs font-bold px-4 py-2.5 rounded-xl transition shadow-md shadow-teal-900/10">
            + Add Experience
        </button>
    </div>

    <div class="bg-slate-850 border border-slate-800 rounded-2xl overflow-hidden shadow-xl">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="bg-slate-800/50 border-b border-slate-800 text-xs font-bold uppercase tracking-wider text-slate-400">
                    <th class="p-4">Name</th>
                    <th class="p-4">Date</th>
                    <th class="p-4">Species</th>
                    <th class="p-4">Hours</th>
                    <th class="p-4">Duties</th>
                    <th class="p-4">Contact</th>
                </tr>
            </thead>
            <tbody id="animal-table-body" class="text-sm divide-y divide-slate-800/40 text-slate-300">
            </tbody>
        </table>
    </div>
</section>

<div id="animal-modal" class="hidden fixed inset-0 bg-slate-950/70 backdrop-blur-sm items-center justify-center p-4 z-50">
    <div class="bg-slate-800 border border-slate-700 w-full max-w-md rounded-2xl p-6 shadow-2xl space-y-4">
        <h3 class="text-lg font-bold text-slate-100">Add Animal Experience</h3>
        <form id="animal-form" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Organization Name</label>
                <input id="anim-name" type="text" required class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-slate-100 text-sm focus:outline-none focus:border-teal-500 transition">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Date</label>
                    <input id="anim-date" type="date" required class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-slate-100 text-sm focus:outline-none focus:border-teal-500 transition">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Hours</label>
                    <input id="anim-hours" type="number" step="0.25" required class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-slate-100 text-sm focus:outline-none focus:border-teal-500 transition">
                </div>
            </div>
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Species (Animals Worked With)</label>
                <input id="anim-species" type="text" placeholder="e.g. Canine, Feline, Equine" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-slate-100 text-sm focus:outline-none focus:border-teal-500 transition">
            </div>
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Duties Summary</label>
                <textarea id="anim-duties" required rows="2" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-slate-100 text-sm focus:outline-none focus:border-teal-500 transition resize-none"></textarea>
            </div>
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Contact Info</label>
                <input id="anim-contact" type="text" required class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-slate-100 text-sm focus:outline-none focus:border-teal-500 transition">
            </div>
            <div class="flex justify-end space-x-3 pt-2">
                <button type="button" onclick="toggleModal('animal-modal', false)" class="px-4 py-2 text-sm text-slate-400">Cancel</button>
                <button type="submit" class="bg-teal-600 text-white text-sm px-5 py-2 rounded-xl">Save Entry</button>
            </div>
        </form>
    </div>
</div>
